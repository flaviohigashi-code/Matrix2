<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Eleveld-Like by Higashi</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --blue: #58a6ff;
            --green: #39d353;
            --yellow: #fbbf24;
            --red: #f85149;
            --border: #30363d;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #c9d1d9; padding: 10px; margin: 0; font-size: 16px; }
        .container { max-width: 100%; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin: auto; box-sizing: border-box; }
        h2 { color: var(--blue); text-align: center; text-transform: uppercase; margin: 10px 0 20px 0; font-size: 1.1em; letter-spacing: 1px; }
        .section { background: var(--bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        /* Grid de pesos agora com 3 colunas para ver tudo */
        .weight-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; display: none; }
        .card-p { background: #1c2128; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #30363d; }
        .card-p h4 { margin: 0; font-size: 9px; color: #8b949e; text-transform: uppercase; }
        .card-p span { font-size: 18px; font-weight: bold; color: var(--blue); }
        .card-sugestao { border: 1px solid var(--green); background: rgba(57, 211, 83, 0.05); }

        label { font-size: 11px; color: #8b949e; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; background: #161b22; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; font-size: 16px; text-transform: uppercase; }
        .btn-blue { background: var(--blue); color: #0d1117; }
        .btn-green { background: var(--green); color: #0d1117; margin-top: 20px; }
        
        .strategy-box { display: none; flex-direction: column; gap: 15px; margin-top: 15px; padding: 15px; background: #21262d; border-radius: 10px; border: 1px solid var(--green); }
        .dose-manual-box { background: rgba(248, 81, 73, 0.1); border: 1px solid var(--red); padding: 10px; border-radius: 8px; margin-top: 5px; display: none; }
        
        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 480px; }
        th { background: #21262d; color: var(--blue); padding: 10px 5px; border: 1px solid var(--border); font-size: 10px; }
        td { padding: 12px 5px; border: 1px solid var(--border); text-align: center; font-family: 'Courier New', monospace; font-size: 14px; }
        .highlight-ml { color: var(--green); font-weight: bold; font-size: 1.3em; }
        .ce-val { color: var(--yellow); font-weight: bold; }
        .bordao { text-align: center; font-size: 2.2em; font-weight: 900; color: var(--green); margin-top: 30px; text-shadow: 0 0 15px rgba(57, 211, 83, 0.5); display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Universal Eleveld-Like by Higashi</h2>
    
    <div class="section">
        <label>1. Dados Biométricos</label>
        <div class="grid-inputs">
            <div><label>Peso Real (kg)</label><input type="number" id="p" value="120" inputmode="decimal"></div>
            <div><label>Altura (cm)</label><input type="number" id="h" value="170" inputmode="decimal"></div>
            <div><label>Idade (anos)</label><input type="number" id="i" value="45" inputmode="decimal"></div>
            <div><label>Sexo</label><select id="s"><option value="M">Masc</option><option value="F">Fem</option></select></div>
        </div>
        <button class="btn btn-blue" onclick="calcularPesos()">Calcular Pesos</button>

        <div class="weight-results" id="weightResults">
            <div class="card-p"><h4>Ideal</h4><span id="resIdeal">0</span></div>
            <div class="card-p"><h4>Ajustado</h4><span id="resAjustado">0</span></div>
            <div class="card-p"><h4>LBM</h4><span id="resLBM">0</span></div>
        </div>
    </div>

    <div class="strategy-box" id="strategyBox">
        <label>2. Configuração do Plano</label>
        
        <div>
            <label style="color: var(--green);">Peso p/ Cálculo (pode alterar):</label>
            <input type="number" id="pesoFinalBomba" inputmode="decimal" style="border: 2px solid var(--green); font-weight: bold; font-size: 20px;">
        </div>

        <div>
            <label>Tipo de Indução</label>
            <select id="tipoInducao" onchange="toggleManual()">
                <option value="tci">TCI Puro (Bólus Bomba)</option>
                <option value="manual">Indução Manual (Calculada mg/kg)</option>
            </select>
        </div>

        <div id="manualBox" class="dose-manual-box">
            <label style="color: var(--red);">Sugestão p/ Indução Manual:</label>
            <div id="calculoDosesManual" style="font-size: 13px; line-height: 1.5;"></div>
        </div>

        <div>
            <label>Adjuvantes</label>
            <select id="pocao">
                <option value="sim">Com lido dex</option>
                <option value="nao">Sem lido dex</option>
            </select>
        </div>
        <button class="btn btn-green" onclick="gerarGrade()">Gerar Plano</button>
    </div>

    <div id="resFinal" class="table-container"></div>
    <div id="bordaoFinal" class="bordao">EXCELENTE!</div>
</div>

<script>
function calcularPesos() {
    let p = parseFloat(document.getElementById('p').value);
    let h = parseFloat(document.getElementById('h').value);
    let i = parseFloat(document.getElementById('i').value);
    let s = document.getElementById('s').value;

    let imc = p / Math.pow(h/100, 2);
    let pIdeal = (s === 'M') ? 50 + 0.9 * (h - 152.4) : 45.5 + 0.9 * (h - 152.4);
    let pAjustado = pIdeal + 0.4 * (p - pIdeal);
    let lbm = (s === 'M') ? (1.1 * p) - (128 * Math.pow(p / h, 2)) : (1.07 * p) - (148 * Math.pow(p / h, 2));
    
    document.getElementById('resIdeal').innerText = pIdeal.toFixed(1);
    document.getElementById('resAjustado').innerText = pAjustado.toFixed(1);
    document.getElementById('resLBM').innerText = lbm.toFixed(1);

    // Sugestão Automática de Peso para o Cálculo
    let sugestao;
    if (i < 12) sugestao = p;
    else if (imc > 30) sugestao = pAjustado;
    else sugestao = p;

    document.getElementById('pesoFinalBomba').value = sugestao.toFixed(1);
    document.getElementById('weightResults').style.display = 'grid';
    document.getElementById('strategyBox').style.display = 'flex';
    toggleManual();
}

function toggleManual() {
    let tipo = document.getElementById('tipoInducao').value;
    let box = document.getElementById('manualBox');
    if (tipo === 'manual') {
        let pB = parseFloat(document.getElementById('pesoFinalBomba').value);
        let idade = parseFloat(document.getElementById('i').value);
        
        let mkgP = idade > 70 ? 1.0 : 1.5; 
        let prop = pB * mkgP;
        let fent = pB * 1.5; 
        let rocu = pB * 0.6;

        document.getElementById('calculoDosesManual').innerHTML = 
            `<b>Propofol:</b> ${(prop/10).toFixed(1)} ml (${prop.toFixed(0)} mg)<br>` +
            `<b>Fentanil:</b> ${fent.toFixed(0)} mcg<br>` +
            `<b>Rocurônio:</b> ${(rocu/10).toFixed(1)} ml (${rocu.toFixed(0)} mg)`;
        box.style.display = 'block';
    } else {
        box.style.display = 'none';
    }
}

function gerarGrade() {
    let pB = parseFloat(document.getElementById('pesoFinalBomba').value);
    let i = parseFloat(document.getElementById('i').value);
    let poc = document.getElementById('pocao').value;

    let fatorIdade = i > 45 ? Math.exp(-0.005 * (i - 45)) : 1.0;
    let rP = (poc === 'sim') ? 0.75 : 1.0;
    let rR = (poc === 'sim') ? 0.65 : 1.0;

    let ceBaseP = i > 75 ? 1.6 : (i < 12 ? 3.5 : 2.5);
    let ceBaseR = i > 75 ? 1.4 : (i < 12 ? 4.0 : 3.0);

    const fases = [
        { t: "Pós indução (posicionamento)", cp: ceBaseP, cr: ceBaseR },
        { t: "Estímulo (Pneumo/Incisão)", cp: ceBaseP*1.2, cr: ceBaseR*1.3 },
        { t: "Manutenção Estável", cp: ceBaseP*0.9, cr: ceBaseR*0.9 },
        { t: "Fechamento", cp: ceBaseP*0.7, cr: ceBaseR*0.5 },
        { t: "Despertar", cp: ceBaseP*0.5, cr: ceBaseR*0.3 }
    ];

    let html = `<table><tr><th rowspan="2">Fase</th><th colspan="2">PROPOFOL (ml/h)</th><th colspan="2">REMI (ml/h)</th></tr>
                <tr><th>Alvo Ce</th><th>Agilia</th><th>Alvo Ce</th><th>Agilia</th></tr>`;

    fases.forEach(f => {
        let alo = Math.pow(pB / 70, 0.75);
        let mlp = ((f.cp * 22 / 1000) * rP * fatorIdade * 1000 * 70 * alo * 60) / 10000;
        let mlr = ((f.cr * 0.045) * rR * fatorIdade * 70 * alo * 60) / 40;

        html += `<tr>
            <td style="text-align:left; font-weight:bold;">${f.t}</td>
            <td class="ce-val">${f.cp.toFixed(1)}</td>
            <td class="highlight-ml">${mlp.toFixed(1)}</td>
            <td class="ce-val">${f.cr.toFixed(1)}</td>
            <td class="highlight-ml">${mlr.toFixed(1)}</td>
        </tr>`;
    });

    document.getElementById('resFinal').innerHTML = html + `</table>`;
    document.getElementById('bordaoFinal').style.display = 'block';
    document.getElementById('bordaoFinal').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
